# release chupet windows x64 binary
name: Release

on:
  release:
    types: [created]
  workflow_dispatch:

jobs:
  build-windows:
    name: build for windows-x64
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4

    # compile windows x64 binary using gcc
    - name: compile chupet-windows-x64.exe
      run: |
        gcc -Wall -Wextra -O2 -std=gnu99 -Iinclude -D_DEFAULT_SOURCE -D_GNU_SOURCE src/main.c src/config.c src/http_client.c -o chupet-windows-x64.exe

    # upload executable to github actions artifacts
    - name: upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: chupet-windows-x64-exe
        path: chupet-windows-x64.exe

  # attach exe to github release
  publish:
    needs: build-windows
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: chupet-windows-x64-exe
      - name: upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: chupet-windows-x64.exe
